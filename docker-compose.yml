services:
  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.${ROUTER_PREFIX}-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_PREFIX}-backend.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_PREFIX}-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.${ROUTER_PREFIX}-backend.loadbalancer.server.port=3001"
    networks:
      - default
      - traefik-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://${API_DOMAIN}/api
    restart: always
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.${ROUTER_PREFIX}-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_PREFIX}-frontend.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_PREFIX}-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.${ROUTER_PREFIX}-frontend.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik-net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

networks:
  traefik-net:
    external: true
